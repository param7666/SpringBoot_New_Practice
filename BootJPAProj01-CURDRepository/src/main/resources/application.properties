spring.application.name=BootJPAProj01-CURDRepository



# Database URL
spring.datasource.url=jdbc:postgresql://localhost:5432/tcs_practice

# PostgreSQL Username
spring.datasource.username=postgres

# PostgreSQL Password
spring.datasource.password=param@1234

# PostgreSQL Driver (optional — Spring Boot auto-detects this from the URL, but explicit is fine)
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate Properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# PostgreSQL Dialect (optional in Hibernate 6+, but harmless to keep)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Optional but useful for debugging bind parameters in logs
logging.level.org.hibernate.orm.jdbc.bind=TRACE


